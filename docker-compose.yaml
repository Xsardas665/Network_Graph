version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "9292:9292"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "8282:8282"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev
    environment:
      - VITE_API_URL=http://backend:9292
