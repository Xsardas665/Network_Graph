version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "9292:9292"
    volumes:
      - ./backend/data.json:/app/data.json
    environment:
      - NODE_ENV=production

  frontend:
    build: ./frontend
    ports:
      - "8282:8282"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:9292
